# Server port — Render injects PORT env var automatically
server.port=${PORT:8080}

# === Database configuration ===
# If DATABASE_URL env var is set (cloud / Render), use PostgreSQL.
# Otherwise, fall back to SQLite for local development.
spring.datasource.url=${DATABASE_URL:jdbc:sqlite:rulecenter.db}
spring.datasource.driver-class-name=${DB_DRIVER:org.sqlite.JDBC}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.community.dialect.SQLiteDialect}

# Optional credentials (only used when DATABASE_URL is a JDBC URL that needs them)
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JSON serialization
spring.jackson.serialization.write-dates-as-timestamps=false

# CORS allowed origins — comma-separated list (override via env var on Render)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173}

# Logging
logging.level.org.hibernate.SQL=WARN
logging.level.com.rulecenter=INFO
